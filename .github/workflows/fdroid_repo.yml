name: Publish to F-Droid Repo

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configuration Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver default-jdk apksigner zipalign libjpeg-dev zlib1g-dev

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Setup F-Droid Repo
        run: |
          mkdir -p fdroid/repo
          cp app/build/outputs/apk/debug/app-debug.apk fdroid/repo/Valoria-${{ github.ref_name }}.apk
          cd fdroid
          fdroid init
          
          # Personnaliser le repo
          sed -i 's/repo_name = .*/repo_name = "Repo Valoria (Dynag1)"/' config.yml
          sed -i 's/repo_description = .*/repo_description = "Dépôt personnel pour les tests de Valoria."/' config.yml
          sed -i 's|repo_url = .*|repo_url = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"|' config.yml
          
          # Mettre à jour et construire l'index
          fdroid update -c
          
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './fdroid/repo'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
